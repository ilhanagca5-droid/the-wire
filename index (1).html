<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE WIRE — U.S. News</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f7;
  --glass: rgba(255,255,255,0.72);
  --glass2: rgba(255,255,255,0.45);
  --glass-border: rgba(255,255,255,0.6);
  --ink: #08111f;
  --ink2: #1e2d45;
  --muted: #6b7a99;
  --blue: #0057ff;
  --blue2: #3b7cff;
  --blue-light: #e8eeff;
  --green: #00c27a;
  --red: #ff3b3b;
  --gold: #f5a623;
  --card-shadow: 0 2px 20px rgba(0,40,120,.07), 0 1px 4px rgba(0,40,120,.04);
  --card-shadow-hover: 0 8px 40px rgba(0,40,120,.13), 0 2px 8px rgba(0,40,120,.06);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(0,87,255,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,87,255,.05) 0%, transparent 60%);
  background-attachment: fixed;
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,87,255,.2); border-radius: 4px; }

/* ══ HEADER ══ */
.site-header {
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(24px) saturate(1.8);
  -webkit-backdrop-filter: blur(24px) saturate(1.8);
  background: rgba(240,242,247,0.88);
  border-bottom: 1px solid var(--glass-border);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 32px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(0,87,255,.08);
}

.live-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,87,255,.08);
  border: 1px solid rgba(0,87,255,.15);
  border-radius: 20px;
  padding: 3px 10px 3px 6px;
  color: var(--blue);
  font-weight: 500;
}

.live-dot {
  width: 6px; height: 6px;
  background: var(--blue);
  border-radius: 50%;
  animation: blink 2s infinite;
  box-shadow: 0 0 6px var(--blue);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.masthead {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 12px 32px 10px;
  gap: 24px;
}

.masthead-side {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  line-height: 2;
}
.masthead-side.right { text-align: right; }

.masthead-center {
  text-align: center;
}

.masthead-center h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(44px, 5.5vw, 72px);
  font-weight: 400;
  letter-spacing: -1px;
  color: var(--ink);
  line-height: 1;
}

.masthead-center h1 span {
  color: var(--blue);
}

.masthead-center .sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
}

/* Ticker */
.ticker-wrap {
  background: var(--ink);
  height: 32px;
  display: flex;
  align-items: center;
  overflow: hidden;
  gap: 0;
}

.ticker-tag {
  background: var(--blue);
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  padding: 0 14px;
  height: 100%;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  gap: 6px;
}

.ticker-scroll { overflow: hidden; flex: 1; }

.ticker-text {
  display: inline-block;
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,.55);
  padding-left: 32px;
  animation: run 60s linear infinite;
}
@keyframes run { from{transform:translateX(100vw)} to{transform:translateX(-100%)} }

/* Nav */
.main-nav {
  display: flex;
  padding: 0 28px;
  gap: 2px;
  border-top: 1px solid rgba(0,87,255,.08);
  overflow-x: auto;
  scrollbar-width: none;
}
.main-nav::-webkit-scrollbar { display: none; }

.nav-btn {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 10px 14px;
  border: none;
  background: none;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.nav-btn:hover { color: var(--ink); }
.nav-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ══ LAYOUT ══ */
.outer {
  display: grid;
  grid-template-columns: 200px 1fr;
  min-height: calc(100vh - 160px);
  gap: 0;
}

/* ══ SIDEBAR ══ */
.sidebar {
  padding: 20px 0 40px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  scrollbar-width: none;
  align-self: start;
  border-right: 1px solid rgba(0,87,255,.08);
  background: rgba(255,255,255,.3);
}
.sidebar::-webkit-scrollbar { display: none; }

.sb-header {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--blue);
  padding: 0 16px 12px;
  border-bottom: 1px solid rgba(0,87,255,.1);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sb-refresh {
  font-size: 14px;
  cursor: pointer;
  color: var(--muted);
  background: none;
  border: none;
  padding: 0;
  transition: transform .4s, color .15s;
}
.sb-refresh:hover { color: var(--blue); transform: rotate(180deg); }

.sb-group {
  padding: 12px 0 8px;
  border-bottom: 1px solid rgba(0,87,255,.06);
}

.sb-group-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(107,122,153,.5);
  padding: 0 16px 8px;
}

.sb-item {
  padding: 6px 16px 7px;
  border-left: 2px solid transparent;
  transition: background .12s, border-color .12s;
  cursor: default;
}
.sb-item:hover {
  background: rgba(0,87,255,.04);
  border-left-color: var(--blue);
}

.sb-name {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 2px;
}

.sb-price {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.sb-change {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  margin-top: 1px;
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 500;
}
.sb-change.up   { color: var(--green); background: rgba(0,194,122,.08); }
.sb-change.down { color: var(--red);   background: rgba(255,59,59,.08); }
.sb-change.flat { color: var(--muted); }

.sb-updated {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  color: rgba(107,122,153,.4);
  padding: 12px 16px 0;
  line-height: 1.8;
}

.sb-loading {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  padding: 20px 16px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

/* ══ NEWS AREA ══ */
.page-wrap {
  padding: 24px 28px 80px;
}

.news-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 0;
  gap: 16px;
}

.news-loading .bar {
  width: 160px; height: 2px;
  background: rgba(0,87,255,.12);
  overflow: hidden;
  border-radius: 2px;
}
.news-loading .bar::after {
  content: '';
  display: block;
  width: 50%;
  height: 100%;
  background: var(--blue);
  border-radius: 2px;
  animation: loadbar 1s ease-in-out infinite alternate;
}
@keyframes loadbar { from{transform:translateX(-100%)} to{transform:translateX(200%)} }

.news-loading .lbl {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
}

/* ── HERO GRID ── */
.hero-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
  animation: fadeUp .45s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.card-hero {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--card-shadow);
  transition: box-shadow .2s, transform .2s;
  display: flex;
  flex-direction: column;
  backdrop-filter: blur(8px);
}
.card-hero:hover {
  box-shadow: var(--card-shadow-hover);
  transform: translateY(-2px);
}

.hero-img-wrap {
  position: relative;
  width: 100%;
  height: 220px;
  overflow: hidden;
  background: linear-gradient(135deg, var(--blue-light), rgba(0,87,255,.08));
  flex-shrink: 0;
}

.hero-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .4s;
}
.card-hero:hover .hero-img-wrap img { transform: scale(1.03); }

.hero-img-ph {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Instrument Serif', serif;
  font-size: 48px;
  color: rgba(0,87,255,.15);
}

.hero-body {
  padding: 20px 22px 18px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ── SIDE STACK ── */
.side-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card-mid {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--card-shadow);
  flex: 1;
  display: flex;
  flex-direction: column;
  transition: box-shadow .2s, transform .2s;
  backdrop-filter: blur(8px);
}
.card-mid:hover {
  box-shadow: var(--card-shadow-hover);
  transform: translateY(-2px);
}

.mid-img-wrap {
  width: 100%; height: 100px;
  overflow: hidden;
  background: linear-gradient(135deg, var(--blue-light), rgba(0,87,255,.06));
  flex-shrink: 0;
}
.mid-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.mid-img-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:28px; color:rgba(0,87,255,.12); }

.mid-body {
  padding: 14px 16px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ── BOTTOM GRID ── */
.bottom-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 14px;
  animation: fadeUp .45s ease .1s both;
}

.card-small {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--card-shadow);
  display: flex;
  flex-direction: column;
  transition: box-shadow .2s, transform .2s;
  backdrop-filter: blur(8px);
}
.card-small:hover {
  box-shadow: var(--card-shadow-hover);
  transform: translateY(-2px);
}

.small-img-wrap {
  width: 100%; height: 80px;
  overflow: hidden;
  background: linear-gradient(135deg, var(--blue-light), rgba(0,87,255,.06));
  flex-shrink: 0;
}
.small-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.small-img-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:22px; color:rgba(0,87,255,.12); }

.small-body {
  padding: 12px 14px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ── TYPOGRAPHY ── */
.cat-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(0,87,255,.08);
  border: 1px solid rgba(0,87,255,.15);
  color: var(--blue);
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  margin-bottom: 10px;
  width: fit-content;
}

.hl-hero {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(18px, 2vw, 26px);
  font-weight: 400;
  line-height: 1.25;
  color: var(--ink);
  margin-bottom: 10px;
  flex: 0;
}

.hl-mid {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(14px, 1.3vw, 17px);
  font-weight: 400;
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 6px;
}

.hl-sm {
  font-family: 'Instrument Serif', serif;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 6px;
}

.summary {
  font-size: 13px;
  line-height: 1.75;
  color: var(--muted);
  margin-bottom: 14px;
  flex: 1;
}

.summary-sm {
  font-size: 12px;
  line-height: 1.7;
  color: var(--muted);
  margin-bottom: 8px;
  flex: 1;
}

.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px solid rgba(0,87,255,.07);
  gap: 8px;
}

.meta-source {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.meta-time {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: rgba(107,122,153,.6);
  white-space: nowrap;
}

.read-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--blue);
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  text-decoration: none;
  white-space: nowrap;
  transition: background .15s, transform .1s;
  flex-shrink: 0;
}
.read-btn:hover { background: var(--ink); transform: scale(1.03); }

.news-err {
  background: rgba(255,59,59,.06);
  border: 1px solid rgba(255,59,59,.15);
  border-radius: 12px;
  padding: 24px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--red);
}

footer {
  background: var(--ink);
  text-align: center;
  padding: 18px 32px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,.25);
  letter-spacing: 2px;
}
footer span { color: var(--blue2); }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <span id="hdr-date">—</span>
    <span>LIVE U.S. NEWS</span>
    <div class="live-chip"><span class="live-dot"></span><span id="hdr-time">—</span> ET</div>
  </div>
  <div class="masthead">
    <div class="masthead-side left">
      <div>Washington D.C.</div>
      <div id="hdr-dctime">—</div>
    </div>
    <div class="masthead-center">
      <h1>THE <span>WIRE</span></h1>
      <div class="sub">U.S. Intelligence · Daily Edition</div>
    </div>
    <div class="masthead-side right">
      <div>İstanbul</div>
      <div id="hdr-trtime">—</div>
    </div>
  </div>
  <div class="ticker-wrap">
    <div class="ticker-tag">⚡ Breaking</div>
    <div class="ticker-scroll"><span class="ticker-text" id="ticker">Loading live headlines...</span></div>
  </div>
  <nav class="main-nav">
    <button class="nav-btn active" onclick="loadNews('national',this)">National</button>
    <button class="nav-btn" onclick="loadNews('politics',this)">Politics</button>
    <button class="nav-btn" onclick="loadNews('economy',this)">Economy</button>
    <button class="nav-btn" onclick="loadNews('foreign',this)">Foreign Policy</button>
    <button class="nav-btn" onclick="loadNews('tech',this)">Technology</button>
    <button class="nav-btn" onclick="loadNews('defense',this)">Defense</button>
  </nav>
</header>

<div class="outer">
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">Markets <button class="sb-refresh" onclick="loadMarkets()" title="Refresh">↻</button></div>
    <div class="sb-loading">Loading...</div>
  </aside>
  <div class="page-wrap" id="page">
    <div class="news-loading"><div class="bar"></div><div class="lbl">Loading Live News</div></div>
  </div>
</div>

<footer><span>THE WIRE</span> &mdash; Live U.S. News · Market data via Yahoo Finance</footer>

<script>
function tick(){
  const n=new Date();
  document.getElementById('hdr-date').textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const dcTime=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'});
  const trTime=n.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Istanbul'});
  document.getElementById('hdr-time').textContent=dcTime;
  const dcEl=document.getElementById('hdr-dctime'); if(dcEl) dcEl.textContent=dcTime+' ET';
  const trEl=document.getElementById('hdr-trtime'); if(trEl) trEl.textContent=trTime+' TR';
}
tick(); setInterval(tick,30000);

function timeAgo(iso){
  const diff=(Date.now()-new Date(iso))/1000;
  if(diff<60) return 'just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}

const CAT_LABELS={national:'National',politics:'Politics',economy:'Economy',foreign:'Foreign Policy',tech:'Technology',defense:'Defense'};

function imgWrap(url, cls, h){
  const ph=`<div class="${cls}-ph">📰</div>`;
  if(url) return `<div class="${cls}"><img src="${url}" onerror="this.parentNode.innerHTML='${ph.replace(/'/g,"\\'")}'" alt=""></div>`;
  return `<div class="${cls}">${ph}</div>`;
}

function readBtn(url){ return `<a class="read-btn" href="${url}" target="_blank">Read ↗</a>`; }

async function loadNews(cat, btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page').innerHTML=`<div class="news-loading"><div class="bar"></div><div class="lbl">Loading Live News</div></div>`;

  try {
    const res=await fetch(`/api/news?category=${cat}`);
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||'API error');
    const arts=data.articles;
    if(!arts||arts.length===0) throw new Error('No articles found');

    const label=CAT_LABELS[cat]||cat;
    const chip=`<div class="cat-chip">${label}</div>`;

    const t=document.getElementById('ticker');
    t.textContent=arts.map(a=>a.title).join('  ·  ');
    t.style.animation='none'; t.offsetHeight; t.style.animation='';

    const hero=arts[0];
    const mid=arts.slice(1,3);
    const smll=arts.slice(3,6);
    const extra=arts.slice(6,10);

    document.getElementById('page').innerHTML=`
      <div class="hero-grid">
        <div class="card-hero">
          ${imgWrap(hero.image,'hero-img-wrap',220)}
          <div class="hero-body">
            ${chip}
            <div class="hl-hero">${hero.title}</div>
            <div class="summary">${hero.description||''}</div>
            <div class="card-meta">
              <span class="meta-source">${hero.source}</span>
              <span class="meta-time">${timeAgo(hero.publishedAt)}</span>
              ${readBtn(hero.url)}
            </div>
          </div>
        </div>
        <div class="side-stack">
          ${mid.map(a=>`
            <div class="card-mid">
              ${imgWrap(a.image,'mid-img-wrap',100)}
              <div class="mid-body">
                ${chip}
                <div class="hl-mid">${a.title}</div>
                <div class="summary-sm">${a.description||''}</div>
                <div class="card-meta">
                  <span class="meta-source">${a.source}</span>
                  <span class="meta-time">${timeAgo(a.publishedAt)}</span>
                  ${readBtn(a.url)}
                </div>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <div class="bottom-grid">
        ${smll.map(a=>`
          <div class="card-small">
            ${imgWrap(a.image,'small-img-wrap',80)}
            <div class="small-body">
              ${chip}
              <div class="hl-sm">${a.title}</div>
              <div class="summary-sm">${a.description||''}</div>
              <div class="card-meta">
                <span class="meta-source">${a.source}</span>
                <span class="meta-time">${timeAgo(a.publishedAt)}</span>
                ${readBtn(a.url)}
              </div>
            </div>
          </div>`).join('')}
      </div>

      ${extra.length>0?`<div class="bottom-grid">
        ${extra.map(a=>`
          <div class="card-small">
            ${imgWrap(a.image,'small-img-wrap',80)}
            <div class="small-body">
              ${chip}
              <div class="hl-sm">${a.title}</div>
              <div class="summary-sm">${a.description||''}</div>
              <div class="card-meta">
                <span class="meta-source">${a.source}</span>
                <span class="meta-time">${timeAgo(a.publishedAt)}</span>
                ${readBtn(a.url)}
              </div>
            </div>
          </div>`).join('')}
      </div>`:''}`;

  } catch(err){
    document.getElementById('page').innerHTML=`<div class="news-err">Failed to load news: ${err.message}</div>`;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

// Markets
const fmtN=(v,d)=>Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const cls=v=>v>0?'up':v<0?'down':'flat';
const arr=v=>v>0?'▲':v<0?'▼':'—';
const sgn=v=>v>=0?'+':'';

function mkItem(name,price,change,pct,dec=2){
  if(price===null) return `<div class="sb-item"><div class="sb-name">${name}</div><div class="sb-price" style="color:var(--muted)">—</div></div>`;
  const c=cls(change);
  return `<div class="sb-item">
    <div class="sb-name">${name}</div>
    <div class="sb-price">${fmtN(price,dec)}</div>
    <div class="sb-change ${c}">${arr(change)} ${sgn(change)}${fmtN(pct,2)}%</div>
  </div>`;
}

function mkGroup(label,html){
  return `<div class="sb-group"><div class="sb-group-label">${label}</div>${html}</div>`;
}

function decFor(n){if(n.includes('JPY'))return 2;if(n.includes('/'))return 4;return 2;}

async function loadMarkets(){
  const sb=document.getElementById('sidebar');
  const hdr=`<div class="sb-header">Markets <button class="sb-refresh" onclick="loadMarkets()" title="Refresh">↻</button></div>`;
  try{
    const res=await fetch('/api/markets');
    const data=await res.json();
    if(!data.ok) throw new Error(data.error);
    const i=data.indices.map(x=>mkItem(x.name,x.price,x.change,x.pct,2)).join('');
    const f=data.fx.map(x=>mkItem(x.name,x.price,x.change,x.pct,decFor(x.name))).join('');
    const c=data.commodities.map(x=>mkItem(x.name,x.price,x.change,x.pct,2)).join('');
    const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    sb.innerHTML=hdr+mkGroup('INDICES',i)+mkGroup('FX',f)+mkGroup('COMMODITIES',c)+`<div class="sb-updated">Live · Yahoo Finance<br>${now} ET</div>`;
  }catch(e){
    sb.innerHTML=hdr+`<div class="sb-loading" style="color:var(--red)">Unavailable</div>`;
  }
}

loadNews('national', document.querySelector('.nav-btn'));
loadMarkets();
setInterval(loadMarkets,120000);
</script>
