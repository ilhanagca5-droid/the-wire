<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE WIRE — U.S. News</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #ffffff;
  --surface:  #f8faff;
  --surface2: #eef3fc;
  --border:   #dce6f7;
  --border2:  #c5d5f0;
  --text:     #1a2540;
  --muted:    #6b84b0;
  --accent:   #1d4ed8;
  --accent2:  #2563eb;
  --accent3:  #3b82f6;
  --navy:     #0f2857;
  --green:    #059669;
  --red:      #dc2626;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'Libre Baskerville',Georgia,serif; min-height:100vh; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:#f0f4ff; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

.site-header { position:sticky; top:0; z-index:200; background:var(--bg); border-bottom:1px solid var(--border); box-shadow:0 1px 12px rgba(30,70,200,.06); }

.header-top { display:flex; justify-content:space-between; align-items:center; padding:6px 32px; border-bottom:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); background:var(--surface); }

.live-pill { display:flex; align-items:center; gap:5px; color:var(--accent2); font-weight:500; }
.live-dot { width:6px; height:6px; background:var(--accent2); border-radius:50%; animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

.masthead { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:16px 32px 12px; gap:20px; }
.masthead-left,.masthead-right { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); line-height:1.9; }
.masthead-right { text-align:right; }
.masthead-center h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,6vw,82px); letter-spacing:8px; color:var(--navy); line-height:1; text-align:center; }
.masthead-center .sub { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:5px; color:var(--muted); text-align:center; margin-top:3px; text-transform:uppercase; }

.accent-rule { height:3px; background:linear-gradient(90deg,var(--accent) 0%,var(--accent3) 60%,#93c5fd 100%); }

.ticker-bar { display:flex; align-items:center; height:30px; overflow:hidden; border-bottom:1px solid var(--border); background:var(--navy); }
.ticker-label { background:var(--accent); font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:2px; color:#fff; padding:0 14px; height:100%; display:flex; align-items:center; flex-shrink:0; }
.ticker-scroll { overflow:hidden; flex:1; }
.ticker-text { display:inline-block; white-space:nowrap; font-family:'JetBrains Mono',monospace; font-size:10px; color:#93c5fd; padding-left:24px; animation:run 45s linear infinite; }
@keyframes run { from{transform:translateX(100vw)} to{transform:translateX(-100%)} }

.main-nav { display:flex; padding:0 32px; background:var(--bg); border-bottom:2px solid var(--border); gap:2px; }
.nav-btn { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; padding:10px 16px; border:none; background:none; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:color .15s,border-color .15s; }
.nav-btn:hover { color:var(--accent2); }
.nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

.outer { display:grid; grid-template-columns:188px 1fr; min-height:calc(100vh - 160px); }

/* SIDEBAR */
.sidebar { background:var(--surface); border-right:2px solid var(--border); position:sticky; top:0; height:100vh; overflow-y:auto; scrollbar-width:none; align-self:start; padding-bottom:24px; }
.sidebar::-webkit-scrollbar { display:none; }
.sb-header { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:3px; color:var(--accent); padding:14px 14px 12px; border-bottom:2px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--surface); z-index:10; }
.sb-refresh { font-size:15px; cursor:pointer; color:var(--muted); background:none; border:none; padding:0; line-height:1; transition:color .15s,transform .35s; }
.sb-refresh:hover { color:var(--accent); transform:rotate(180deg); }
.sb-group { border-bottom:1px solid var(--border); padding:8px 0 4px; }
.sb-group-label { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--border2); padding:0 14px 6px; }
.sb-item { padding:5px 14px 7px; border-left:3px solid transparent; transition:background .1s,border-color .1s; }
.sb-item:hover { background:var(--surface2); border-left-color:var(--accent3); }
.sb-name { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); margin-bottom:2px; }
.sb-price { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:500; color:var(--navy); }
.sb-change { font-family:'JetBrains Mono',monospace; font-size:9px; margin-top:1px; }
.sb-change.up   { color:var(--green); }
.sb-change.down { color:var(--red); }
.sb-change.flat { color:var(--muted); }
.sb-updated { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--border2); padding:10px 14px 0; line-height:1.8; }
.sb-loading { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); padding:16px 14px; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
.sb-err { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--red); padding:12px 14px; line-height:1.7; }

/* NEWS */
.page-wrap { padding:28px 32px 80px; background:var(--bg); }
.featured-row { display:grid; grid-template-columns:1.55fr 1fr; border:1px solid var(--border); margin-bottom:1px; animation:fadeUp .4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.card-hero { background:var(--bg); padding:30px 28px 24px; border-right:1px solid var(--border); position:relative; }
.card-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent); }
.card-stack { display:flex; flex-direction:column; }
.card-mid { background:var(--surface); padding:20px 22px 16px; flex:1; border-bottom:1px solid var(--border); transition:background .15s; }
.card-mid:last-child { border-bottom:none; }
.card-mid:hover { background:var(--surface2); }
.bottom-row { display:grid; grid-template-columns:repeat(3,1fr); border:1px solid var(--border); border-top:none; animation:fadeUp .4s ease .08s both; }
.card-small { background:var(--bg); padding:16px 18px 14px; border-right:1px solid var(--border); transition:background .15s; }
.card-small:last-child { border-right:none; }
.card-small:hover { background:var(--surface); }

.tag { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--accent2); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.tag::after { content:''; flex:1; height:1px; background:var(--border); }
.hl-hero { font-family:'Libre Baskerville',serif; font-size:clamp(20px,2.2vw,30px); font-weight:700; line-height:1.2; color:var(--navy); margin-bottom:14px; }
.hl-mid { font-family:'Libre Baskerville',serif; font-size:clamp(14px,1.3vw,18px); font-weight:700; line-height:1.25; color:var(--navy); margin-bottom:8px; }
.hl-sm { font-family:'Libre Baskerville',serif; font-size:14px; font-weight:700; line-height:1.3; color:var(--navy); margin-bottom:7px; }
.summary { font-size:13px; line-height:1.82; color:#3a5080; margin-bottom:14px; }
.summary-sm { font-size:12px; line-height:1.78; color:#4a6090; margin-bottom:10px; }
.meta { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); display:flex; justify-content:space-between; padding-top:10px; border-top:1px solid var(--border); }
.idx-num { font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--border2); line-height:1; margin-bottom:4px; }

footer { background:var(--navy); text-align:center; padding:16px 32px; font-family:'JetBrains Mono',monospace; font-size:9px; color:#4a70a0; letter-spacing:2px; }
footer span { color:#93c5fd; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <span id="hdr-date">—</span>
    <span>INDEPENDENT U.S. NEWS COVERAGE</span>
    <div class="live-pill"><span class="live-dot"></span><span id="hdr-time">—</span> ET</div>
  </div>
  <div class="masthead">
    <div class="masthead-left"><div>Washington D.C.</div><div>Est. 2025</div></div>
    <div class="masthead-center">
      <h1>THE WIRE</h1>
      <div class="sub">U.S. Intelligence · Daily Edition</div>
    </div>
    <div class="masthead-right"><div>Politics · Economy</div><div>Defense · Technology</div><div>Foreign Policy</div></div>
  </div>
  <div class="accent-rule"></div>
  <div class="ticker-bar">
    <div class="ticker-label">BREAKING</div>
    <div class="ticker-scroll"><span class="ticker-text" id="ticker">—</span></div>
  </div>
  <nav class="main-nav">
    <button class="nav-btn active" onclick="showCat('national',this)">National</button>
    <button class="nav-btn" onclick="showCat('politics',this)">Politics</button>
    <button class="nav-btn" onclick="showCat('economy',this)">Economy</button>
    <button class="nav-btn" onclick="showCat('foreign',this)">Foreign Policy</button>
    <button class="nav-btn" onclick="showCat('tech',this)">Technology</button>
    <button class="nav-btn" onclick="showCat('defense',this)">Defense</button>
  </nav>
</header>

<div class="outer">
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">MARKETS <button class="sb-refresh" onclick="loadMarkets()" title="Refresh">↻</button></div>
    <div class="sb-loading">Loading...</div>
  </aside>
  <div class="page-wrap" id="page"></div>
</div>

<footer><span>THE WIRE</span> &mdash; U.S. News Intelligence &mdash; Market data via Yahoo Finance</footer>

<script>
// ══ CLOCK ══
function tick() {
  const n = new Date();
  document.getElementById('hdr-date').textContent = n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('hdr-time').textContent = n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,30000);

// ══ NEWS ══
const NEWS = {
  national:{ticker:"GOVERNMENT SHUTDOWN LOOMS AS BUDGET TALKS STALL  ◆  FED HOLDS RATES AMID INFLATION DATA  ◆  SUPREME COURT TO RULE ON EXECUTIVE POWER  ◆  NATIONAL GUARD DEPLOYED IN THREE STATES",hero:{tag:"NATIONAL",headline:"Government Shutdown Clock Ticks Down as Budget Negotiations Collapse",summary:"Congressional leaders failed to reach a spending agreement Sunday night, leaving the federal government 72 hours from a shutdown that would furlough hundreds of thousands of workers. Republican leadership demands an 8% defense spending increase while Democrats reject proposed cuts to Medicaid and education. The White House is conducting parallel negotiations with both chambers. Treasury Secretary warned markets of potential turbulence if no deal is reached by Thursday midnight.",time:"2 hours ago",source:"Washington, D.C."},mid:[{tag:"JUDICIARY",headline:"Supreme Court Agrees to Hear Landmark Executive Power Case",summary:"The court will take up a challenge to the president's authority to impose emergency tariffs without congressional approval. A ruling is expected by June.",time:"3 hrs ago",source:"Washington"},{tag:"IMMIGRATION",headline:"National Guard Activated at Southern Border in Three States",summary:"Texas, Arizona and New Mexico governors activated National Guard units following a surge in unauthorized crossings. Federal coordination remains unresolved.",time:"5 hrs ago",source:"Austin, TX"}],small:[{tag:"HEALTH",headline:"CDC Issues Nationwide Measles Alert After Outbreak Spreads to 14 States",summary:"Health officials are urging vaccination as cases exceed 400 nationally, the highest count in two decades.",time:"4 hrs ago"},{tag:"INFRASTRUCTURE",headline:"Senate Passes $180 Billion Highway and Rail Funding Package",summary:"Bipartisan agreement allocates funds to bridge repairs, Amtrak expansion and EV charging networks across 47 states.",time:"6 hrs ago"},{tag:"EDUCATION",headline:"Department of Education Proposes Sweeping Student Loan Overhaul",summary:"New income-based repayment caps and expanded forgiveness pathways would affect roughly 43 million borrowers.",time:"8 hrs ago"}]},
  politics:{ticker:"2026 MIDTERM BATTLEGROUNDS TAKING SHAPE  ◆  SENATE JUDICIARY HOLDS UP THREE NOMINATIONS  ◆  WHITE HOUSE SIGNS CLIMATE EXECUTIVE ORDER  ◆  DEMOCRATIC CAUCUS FRACTURES OVER SPENDING",hero:{tag:"POLITICS",headline:"2026 Midterms: The Seven Districts That Will Decide Control of Congress",summary:"With eight months until Election Day, analysts have identified a handful of razor-thin battleground districts where the majority will be won or lost. Republicans hold a 12-seat House advantage but face demographic headwinds in suburban Philadelphia, Detroit and Phoenix. Democrats are recruiting candidates with military backgrounds and economic credibility. New fundraising disclosures show record spending in these districts, with outside groups pouring in $340 million combined.",time:"1 hour ago",source:"Washington, D.C."},mid:[{tag:"WHITE HOUSE",headline:"President Signs Executive Order Mandating Federal EV Fleet by 2035",summary:"The order requires all federal vehicle purchases to be zero-emission starting in 2027. Republican-led states have already signaled legal challenges.",time:"3 hrs ago",source:"Washington"},{tag:"SENATE",headline:"Three Judicial Nominations Blocked in Committee on Party-Line Vote",summary:"Senate Judiciary Committee Republicans used procedural maneuvers to delay confirmation hearings for nominees to federal appellate courts.",time:"5 hrs ago",source:"Capitol Hill"}],small:[{tag:"PARTY POLITICS",headline:"Progressive Democrats Challenge Leadership Over Defense Budget Compromise",summary:"A bloc of roughly 40 House progressives is threatening to withhold votes on the continuing resolution unless social spending is preserved.",time:"4 hrs ago"},{tag:"GOVERNORS",headline:"Florida and California Governors Clash Over Education Funding Models",summary:"A high-profile policy dispute is drawing national attention ahead of potential presidential runs by both governors in 2028.",time:"6 hrs ago"},{tag:"ELECTIONS",headline:"FEC Reports Record $2.1 Billion Already Raised for 2026 Cycle",summary:"Outside spending groups account for nearly half the total, raising renewed calls for campaign finance reform legislation.",time:"9 hrs ago"}]},
  economy:{ticker:"CPI FALLS TO 2.8%, THREE-YEAR LOW  ◆  S&P 500 WITHIN 0.4% OF ALL-TIME HIGH  ◆  HOUSING STARTS DROP 6% IN MARCH  ◆  JOBLESS CLAIMS SURPRISE TO THE DOWNSIDE",hero:{tag:"ECONOMY",headline:"Inflation Retreats to 2.8%, Opening Door for Fed Rate Cuts Later This Year",summary:"The Consumer Price Index rose just 2.8% annually in March, its lowest reading since early 2022. Core inflation came in at 3.1%. The retreat was driven by falling shelter costs and a 4.2% decline in energy prices. Fed futures markets immediately repriced, now pricing in two 25-basis-point cuts before year-end.",time:"1 hour ago",source:"Washington, D.C."},mid:[{tag:"MARKETS",headline:"S&P 500 Climbs 1.4% on Inflation Data, Edges Toward Record",summary:"Technology and healthcare led gains as investors repriced rate expectations. The index closed within 0.4% of its all-time high set in January.",time:"3 hrs ago",source:"New York"},{tag:"HOUSING",headline:"Existing Home Sales Fall 6% as Mortgage Rates Linger Above 6.5%",summary:"Tight inventory and elevated borrowing costs continue to sideline first-time buyers. Median home prices held at $412,000 nationally.",time:"4 hrs ago",source:"Washington"}],small:[{tag:"LABOR",headline:"Weekly Jobless Claims Come in at 218,000, Below Forecast of 230,000",summary:"The labor market continues to show surprising resilience despite monetary tightening.",time:"5 hrs ago"},{tag:"TRADE",headline:"U.S.-China Tariff Reduction Talks Resume in Geneva This Week",summary:"Technical-level delegations are meeting to discuss phased reductions on industrial goods.",time:"6 hrs ago"},{tag:"ENERGY",headline:"WTI Crude Falls to $74, Six-Month Low Before OPEC+ Production Decision",summary:"Markets anticipate a possible output increase at Thursday's meeting.",time:"8 hrs ago"}]},
  foreign:{ticker:"CEASEFIRE TALKS IN DOHA REACH CRITICAL JUNCTURE  ◆  NATO CHIEF VISITS WHITE HOUSE  ◆  TAIWAN STRAIT TRANSIT SPARKS CHINA RESPONSE  ◆  NORTH KOREA FIRES BALLISTIC MISSILE",hero:{tag:"FOREIGN POLICY",headline:"Gaza Ceasefire Talks at Breaking Point as U.S. Presses Both Sides for Deal",summary:"The U.S. special envoy to the Middle East is applying direct pressure on Israeli and Hamas delegations in Doha to reach a framework agreement within 96 hours. The proposed deal would pause fighting for six weeks in exchange for staged release of hostages. Egypt and Qatar are serving as primary intermediaries. The White House said failure to reach an agreement would necessitate a reassessment of military and financial assistance.",time:"2 hours ago",source:"Doha / Washington"},mid:[{tag:"NATO",headline:"NATO Secretary General Meets President to Discuss Ukraine Aid Package",summary:"Alliance chief pressed for a new $60 billion military assistance tranche and faster F-16 deliveries ahead of Ukraine's anticipated summer offensive.",time:"4 hrs ago",source:"Washington"},{tag:"INDO-PACIFIC",headline:"U.S. Warships Conduct Taiwan Strait Transit, Beijing Responds with Drills",summary:"Two Navy guided-missile destroyers transited the strait. China's PLA Eastern Theater Command launched exercises in response.",time:"6 hrs ago",source:"Pacific Fleet"}],small:[{tag:"UKRAINE",headline:"Ukraine Recaptures Key Villages in Donetsk as U.S. Drone Support Increases",summary:"Armed forces report advances along a 12-kilometer front line. Pentagon confirmed expanded drone intelligence-sharing protocols are now operational.",time:"3 hrs ago"},{tag:"NORTH KOREA",headline:"Pyongyang Fires Intermediate-Range Ballistic Missile, Lands in Sea of Japan",summary:"The U.S., South Korea and Japan issued a joint condemnation. The UN Security Council has been called to an emergency session.",time:"7 hrs ago"},{tag:"IRAN",headline:"Indirect U.S.-Iran Nuclear Talks Suspended After Four Rounds Without Progress",summary:"European mediators said both sides remain too far apart on enrichment limits and sanctions relief.",time:"10 hrs ago"}]},
  tech:{ticker:"CONGRESS ADVANCES AI REGULATION BILL  ◆  FTC FINES META $1.3 BILLION  ◆  APPLE UNVEILS M4 CHIP  ◆  OPENAI LAUNCHES NEW FRONTIER MODEL",hero:{tag:"TECHNOLOGY",headline:"Senate AI Bill Would Require Mandatory Audits of High-Risk Models — Silicon Valley Mobilizes",summary:"The Senate Commerce Committee is preparing to advance a sweeping artificial intelligence regulation bill imposing mandatory transparency requirements, third-party audits and human oversight mandates on high-risk AI systems. The legislation targets frontier models with more than 10 billion parameters. Major AI labs have deployed dozens of lobbyists on Capitol Hill warning the bill would kneecap American AI leadership relative to China.",time:"1 hour ago",source:"Washington / San Francisco"},mid:[{tag:"BIG TECH",headline:"FTC Hits Meta with $1.3 Billion Fine Over Location Data Misuse",summary:"Regulators found Meta had incorporated precise user location data into its advertising systems without proper consent, violating a 2019 consent decree.",time:"3 hrs ago",source:"Washington"},{tag:"AI",headline:"OpenAI Releases New Reasoning Model, Claims 40% Jump in Scientific Benchmarks",summary:"The model demonstrates substantially improved performance on mathematics, coding and multi-step scientific reasoning.",time:"5 hrs ago",source:"San Francisco"}],small:[{tag:"APPLE",headline:"Apple's M4 Chip Enters Mass Production Ahead of Fall Mac Lineup",summary:"TSMC's 3nm process yields record efficiency gains. The chip reportedly doubles neural engine performance over M3.",time:"4 hrs ago"},{tag:"TESLA",headline:"Tesla Files for EU Regulatory Approval of Full Self-Driving Software",summary:"European regulators have up to six months to review the application. Tesla's FSD has logged over 2 billion miles in the U.S.",time:"6 hrs ago"},{tag:"CYBERSECURITY",headline:"CISA Thwarts State-Sponsored Attack on U.S. Energy Grid Systems",summary:"The agency attributed the intrusion attempt to a nation-state actor. No operational systems were compromised.",time:"8 hrs ago"}]},
  defense:{ticker:"PENTAGON REQUESTS RECORD $886B BUDGET  ◆  AUKUS SUB PROGRAM ADVANCES  ◆  F-35 DELIVERY TIMELINE RESTORED  ◆  SPACE FORCE EXPANDS LEO FLEET",hero:{tag:"DEFENSE",headline:"Pentagon Submits $886 Billion Budget Request, Doubling AI Weapons Funding",summary:"The Department of Defense submitted its FY2026 budget request to Congress, seeking a 4.1% increase to a record $886 billion. The request earmarks $14 billion for Indo-Pacific deterrence, $13 billion for cyberspace operations and $9 billion for next-generation space assets. Funding for AI-enabled weapons systems more than doubles to $22 billion.",time:"1 hour ago",source:"Washington, D.C."},mid:[{tag:"AUKUS",headline:"Australia, U.K. and U.S. Sign Nuclear Submarine Co-Production Agreement",summary:"The trilateral pact finalizes technical specifications and production sharing. The first Australian-crewed vessel is slated for delivery in 2031.",time:"4 hrs ago",source:"San Diego"},{tag:"AIR FORCE",headline:"Lockheed Martin Restores F-35 Delivery Schedule After 18-Month Delay",summary:"Software deficiencies and supply chain bottlenecks that had halted deliveries since late 2023 are resolved. Forty-eight aircraft are expected this calendar year.",time:"5 hrs ago",source:"Fort Worth, TX"}],small:[{tag:"KOREA",headline:"U.S.-South Korea Ulchi Freedom Shield Exercise Begins with 15,000 Troops",summary:"The annual exercise was expanded following North Korea's missile test and includes simulated cyber warfare scenarios.",time:"3 hrs ago"},{tag:"SPACE FORCE",headline:"Space Force Awards $4.2 Billion Contract for Low-Earth Orbit Surveillance Network",summary:"The constellation of 64 satellites will provide real-time tracking of adversary space assets.",time:"6 hrs ago"},{tag:"CYBER",headline:"U.S. Cyber Command to Double Offensive and Defensive Personnel by Year-End",summary:"The expansion will bring total personnel to approximately 13,000. Recruitment targets veterans with signals intelligence backgrounds.",time:"9 hrs ago"}]}
};

function showCat(key, btn) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const d = NEWS[key];
  const t = document.getElementById('ticker');
  t.textContent = d.ticker;
  t.style.animation='none'; t.offsetHeight; t.style.animation='';
  document.getElementById('page').innerHTML=`
    <div class="featured-row">
      <div class="card-hero">
        <div class="tag">${d.hero.tag}</div>
        <div class="hl-hero">${d.hero.headline}</div>
        <div class="summary">${d.hero.summary}</div>
        <div class="meta"><span>${d.hero.source}</span><span>${d.hero.time}</span></div>
      </div>
      <div class="card-stack">
        ${d.mid.map((m,i)=>`<div class="card-mid">
          <div class="idx-num">0${i+1}</div>
          <div class="tag">${m.tag}</div>
          <div class="hl-mid">${m.headline}</div>
          <div class="summary-sm">${m.summary}</div>
          <div class="meta"><span>${m.source}</span><span>${m.time}</span></div>
        </div>`).join('')}
      </div>
    </div>
    <div class="bottom-row">
      ${d.small.map(s=>`<div class="card-small">
        <div class="tag">${s.tag}</div>
        <div class="hl-sm">${s.headline}</div>
        <div class="summary-sm">${s.summary}</div>
        <div class="meta"><span>${s.time}</span></div>
      </div>`).join('')}
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══ MARKETS ══
const fmtN = (v,d)=>Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const cls  = v=>v>0?'up':v<0?'down':'flat';
const arr  = v=>v>0?'▲':v<0?'▼':'—';
const sgn  = v=>v>=0?'+':'';

function mkItem(name, price, change, pct, dec=2) {
  if (price === null) {
    return `<div class="sb-item"><div class="sb-name">${name}</div><div class="sb-price" style="color:var(--muted)">—</div></div>`;
  }
  const c = cls(change);
  return `<div class="sb-item">
    <div class="sb-name">${name}</div>
    <div class="sb-price">${fmtN(price,dec)}</div>
    <div class="sb-change ${c}">${arr(change)} ${sgn(change)}${fmtN(pct,2)}%</div>
  </div>`;
}

function mkGroup(label, html) {
  return `<div class="sb-group"><div class="sb-group-label">${label}</div>${html}</div>`;
}

function decFor(name) {
  if (name.includes('JPY')) return 2;
  if (name.includes('TRY')) return 4;
  if (name.includes('/')) return 4;
  return 2;
}

async function loadMarkets() {
  const sb = document.getElementById('sidebar');
  const hdr = `<div class="sb-header">MARKETS <button class="sb-refresh" onclick="loadMarkets()" title="Refresh">↻</button></div>`;

  try {
    const res  = await fetch('/api/markets');
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'API error');

    const idxHtml = data.indices.map(i =>
      mkItem(i.name, i.price, i.change, i.pct, 2)).join('');
    const fxHtml  = data.fx.map(i =>
      mkItem(i.name, i.price, i.change, i.pct, decFor(i.name))).join('');
    const cmdHtml = data.commodities.map(i =>
      mkItem(i.name, i.price, i.change, i.pct, 2)).join('');

    const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

    sb.innerHTML = hdr
      + mkGroup('INDICES',     idxHtml)
      + mkGroup('FX',          fxHtml)
      + mkGroup('COMMODITIES', cmdHtml)
      + `<div class="sb-updated">Live · Yahoo Finance<br>${now} ET</div>`;

  } catch (err) {
    sb.innerHTML = hdr + `<div class="sb-err">Market data unavailable.<br>${err.message}</div>`;
  }
}

showCat('national', document.querySelector('.nav-btn'));
loadMarkets();
setInterval(loadMarkets, 120000);
</script>
</body>
</html>
