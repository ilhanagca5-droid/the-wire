<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOON.US — Live U.S. News</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--blue:#1a56db;--blue2:#3b82f6;--blue3:#dbeafe;--navy:#1e3a5f;--sky:#f0f7ff;--ink:#0d1b2a;--gray:#3d5166;--muted:#7b93aa;--border:#d1e0f0;--white:#ffffff;--green:#059669;--red:#dc2626;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--sky);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--blue3);border-radius:4px;}

.top-strip{background:var(--navy);display:flex;justify-content:space-between;align-items:center;padding:0 28px;height:32px;}
.clocks{display:flex;gap:20px;font-family:'DM Mono',monospace;font-size:10px;}
.clock{display:flex;align-items:center;gap:6px;}
.clock-city{font-size:9px;letter-spacing:1px;color:rgba(255,255,255,.3);}
.clock-val{color:rgba(255,255,255,.75);font-weight:500;}
.live-pill{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:1px;color:#93c5fd;}
.pulse{width:6px;height:6px;background:#93c5fd;border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 5px #93c5fd;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}

.site-header{background:var(--white);border-bottom:1px solid var(--border);}
.header-inner{max-width:1320px;margin:0 auto;padding:18px 28px 14px;display:flex;align-items:flex-end;justify-content:space-between;}
.logo{font-family:'Fraunces',serif;font-size:48px;font-weight:900;line-height:1;letter-spacing:-2px;color:var(--ink);}
.logo em{font-style:normal;color:var(--blue);}
.logo-tagline{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.header-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:right;line-height:1.9;}

.ticker-wrap{background:var(--blue);height:34px;display:flex;align-items:center;overflow:hidden;}
.ticker-pill{background:var(--navy);height:100%;display:flex;align-items:center;padding:0 18px;font-family:'Inter',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#93c5fd;flex-shrink:0;gap:6px;}
.ticker-scroll{overflow:hidden;flex:1;}
.ticker-text{display:inline-block;white-space:nowrap;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:rgba(255,255,255,.85);padding-left:40px;animation:run 70s linear infinite;}
@keyframes run{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}

.main-nav{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,50,150,.05);}
.nav-inner{max-width:1320px;margin:0 auto;display:flex;padding:0 28px;overflow-x:auto;scrollbar-width:none;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:13px 16px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s,border-color .15s;}
.nav-btn:hover{color:var(--blue);}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue);}

.body-wrap{max-width:1320px;margin:0 auto;padding:24px 28px 60px;display:grid;grid-template-columns:1fr 256px;gap:28px;}

/* SIDEBAR */
.sidebar{position:sticky;top:50px;align-self:start;display:flex;flex-direction:column;gap:16px;}
.sb-widget{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.sb-head{background:var(--navy);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-family:'Inter',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#93c5fd;}
.sb-refresh{font-size:14px;cursor:pointer;color:rgba(147,197,253,.5);background:none;border:none;padding:0;transition:transform .4s,color .15s;}
.sb-refresh:hover{color:#93c5fd;transform:rotate(180deg);}
.sb-lbl-sec{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);padding:10px 14px 4px;border-top:1px solid var(--border);}
.sb-lbl-sec:first-of-type{border-top:none;}
.sb-row{padding:7px 14px 8px;border-bottom:1px solid #f0f6ff;transition:background .1s;}
.sb-row:last-child{border-bottom:none;}
.sb-row:hover{background:#f8fbff;}
.sb-name{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:2px;}
.sb-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--ink);}
.sb-chg{font-family:'DM Mono',monospace;font-size:9px;margin-top:2px;font-weight:500;padding:1px 5px;border-radius:3px;display:inline-block;}
.sb-chg.up{color:var(--green);background:rgba(5,150,105,.08);}
.sb-chg.down{color:var(--red);background:rgba(220,38,38,.08);}
.sb-chg.flat{color:var(--muted);}
.sb-foot{font-family:'DM Mono',monospace;font-size:9px;color:#c0d4e8;padding:8px 14px;border-top:1px solid var(--border);}
.sb-loading{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:16px 14px;animation:fade 1.5s infinite;}
@keyframes fade{0%,100%{opacity:.3}50%{opacity:1}}

/* NEWS */
.news-col{min-width:0;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 0;gap:14px;}
.loading-state .bar{width:160px;height:2px;background:var(--blue3);overflow:hidden;border-radius:2px;}
.loading-state .bar::after{content:'';display:block;width:50%;height:100%;background:var(--blue);border-radius:2px;animation:lb 1s ease-in-out infinite alternate;}
@keyframes lb{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
.loading-state .lbl{font-family:'Inter',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid var(--ink);}
.sec-left{display:flex;align-items:center;gap:10px;}
.sec-title{font-family:'Inter',sans-serif;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink);}
.sec-badge{background:var(--blue);color:white;font-family:'Inter',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:20px;}
.sec-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}

/* MOSAIC */
.mosaic{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:60px;gap:10px;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.mcard{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s;cursor:pointer;}
.mcard:hover{box-shadow:0 8px 30px rgba(0,50,150,.1);transform:translateY(-2px);}

.mc-hero{grid-column:span 8;grid-row:span 6;}
.mc-tall{grid-column:span 4;grid-row:span 6;}
.mc-wide{grid-column:span 6;grid-row:span 4;}
.mc-medium{grid-column:span 4;grid-row:span 4;}
.mc-small{grid-column:span 3;grid-row:span 3;}
.mc-mini{grid-column:span 4;grid-row:span 3;}

.mcard-img{width:100%;flex-shrink:0;overflow:hidden;}
.mcard-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.mcard:hover .mcard-img img{transform:scale(1.03);}

.mcard-ph{width:100%;height:100%;background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);display:flex;align-items:center;justify-content:center;}
.ph-letter{font-family:'Fraunces',serif;font-weight:900;color:rgba(255,255,255,.15);line-height:1;}

.mc-hero .mcard-img{height:220px;}
.mc-tall .mcard-img{height:180px;}
.mc-wide .mcard-img{height:140px;}
.mc-medium .mcard-img{height:120px;}
.mc-small .mcard-img{height:90px;}
.mc-mini .mcard-img{height:80px;}

.mcard-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;}
.mc-hero .mcard-body{padding:16px 20px;}
.mc-small .mcard-body,.mc-mini .mcard-body{padding:8px 10px 10px;}

.msrc{font-family:'Inter',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.msrc::after{content:'';flex:1;height:1px;background:var(--blue3);}

.mhl{font-family:'Fraunces',serif;font-weight:700;line-height:1.22;color:var(--ink);margin-bottom:6px;}
.mc-hero .mhl{font-size:clamp(18px,1.8vw,24px);}
.mc-tall .mhl{font-size:16px;}
.mc-wide .mhl,.mc-medium .mhl{font-size:15px;}
.mc-small .mhl,.mc-mini .mhl{font-size:12px;}

.mdesc{font-family:'Inter',sans-serif;font-size:12px;line-height:1.68;color:var(--gray);flex:1;margin-bottom:8px;}
.mc-small .mdesc,.mc-mini .mdesc{display:none;}

.mfoot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:8px;border-top:1px solid var(--blue3);gap:6px;}
.mtime{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.mread{font-family:'Inter',sans-serif;font-size:9px;font-weight:700;color:var(--white);background:var(--blue);padding:3px 9px;border-radius:4px;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:background .15s;}
.mread:hover{background:var(--navy);}

.news-err{padding:32px;background:var(--white);border:1px solid var(--border);border-radius:12px;font-size:13px;color:var(--muted);}

footer{background:var(--navy);text-align:center;padding:20px 28px;font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.2);letter-spacing:2px;margin-top:20px;}
footer strong{color:#93c5fd;}
</style>
</head>
<body>

<div class="top-strip">
  <div class="clocks">
    <div class="clock"><span class="clock-city">DC</span><span class="clock-val" id="dc-time">—</span></div>
    <div class="clock"><span class="clock-city">IST</span><span class="clock-val" id="tr-time">—</span></div>
  </div>
  <div class="live-pill"><span class="pulse"></span>LIVE</div>
</div>

<div class="site-header">
  <div class="header-inner">
    <div>
      <div class="logo">NOON<em>.</em>US</div>
      <div class="logo-tagline">Live American News</div>
    </div>
    <div class="header-date" id="hdr-date">—</div>
  </div>
</div>

<div class="ticker-wrap">
  <div class="ticker-pill">⚡ Breaking</div>
  <div class="ticker-scroll"><span class="ticker-text" id="ticker">Loading live headlines...</span></div>
</div>

<nav class="main-nav">
  <div class="nav-inner">
    <button class="nav-btn active" onclick="loadNews('national',this)">National</button>
    <button class="nav-btn" onclick="loadNews('politics',this)">Politics</button>
    <button class="nav-btn" onclick="loadNews('economy',this)">Economy</button>
    <button class="nav-btn" onclick="loadNews('foreign',this)">Foreign Policy</button>
    <button class="nav-btn" onclick="loadNews('tech',this)">Technology</button>
    <button class="nav-btn" onclick="loadNews('defense',this)">Defense</button>
  </div>
</nav>

<div class="body-wrap">
  <div class="news-col" id="news-col">
    <div class="loading-state"><div class="bar"></div><div class="lbl">Loading</div></div>
  </div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-widget">
      <div class="sb-head">Markets <button class="sb-refresh" onclick="loadMarkets()">↻</button></div>
      <div class="sb-loading">Loading...</div>
    </div>
  </aside>
</div>

<footer><strong>NOON.US</strong> &mdash; Live U.S. News via RSS · Market data via Yahoo Finance</footer>

<script>
function tick(){
  const n=new Date();
  document.getElementById('hdr-date').textContent=n.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('dc-time').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'});
  document.getElementById('tr-time').textContent=n.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Istanbul'});
}
tick();setInterval(tick,30000);

function timeAgo(iso){
  const d=Math.floor((Date.now()-new Date(iso))/1000);
  if(d<60)return 'just now';if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';
}

const CAT={national:'National',politics:'Politics',economy:'Economy',foreign:'Foreign Policy',tech:'Technology',defense:'Defense'};
const SIZES=['mc-hero','mc-tall','mc-wide','mc-wide','mc-medium','mc-mini','mc-small','mc-small','mc-mini','mc-medium','mc-small','mc-small'];

// Unsplash category images — always available, no API key needed
const CAT_IMGS={
  national:   'https://images.unsplash.com/photo-1501503069-cd43f3bd0f89?w=800&q=80',
  politics:   'https://images.unsplash.com/photo-1555848962-6e79363ec58f?w=800&q=80',
  economy:    'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=800&q=80',
  foreign:    'https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?w=800&q=80',
  tech:       'https://images.unsplash.com/photo-1518770660439-4636190af475?w=800&q=80',
  defense:    'https://images.unsplash.com/photo-1569629743817-70d8db6c323b?w=800&q=80',
};

let currentCat='national';

function cardImg(url,size){
  const fallback=CAT_IMGS[currentCat]||CAT_IMGS.national;
  const src=url||fallback;
  return `<img src="${src}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.src='${fallback}'" alt="" loading="lazy">`;
}

function buildCard(a,size){
  return `<div class="mcard ${size}" onclick="window.open('${a.url}','_blank')">
    <div class="mcard-img">${cardImg(a.image,size)}</div>
    <div class="mcard-body">
      <div class="msrc">${a.source}</div>
      <div class="mhl">${a.title}</div>
      <div class="mdesc">${a.description||''}</div>
      <div class="mfoot">
        <span class="mtime">${timeAgo(a.publishedAt)}</span>
        <a class="mread" href="${a.url}" target="_blank" onclick="event.stopPropagation()">Read &#8594;</a>
      </div>
    </div>
  </div>`;
}

async function loadNews(cat,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat=cat;
  const col=document.getElementById('news-col');
  col.innerHTML=`<div class="loading-state"><div class="bar"></div><div class="lbl">Loading</div></div>`;
  try{
    const res=await fetch('/api/news?category='+cat);
    const data=await res.json();
    if(!data.ok)throw new Error(data.error);
    const A=data.articles;
    if(!A||!A.length)throw new Error('No articles');
    const label=CAT[cat]||cat;
    const t=document.getElementById('ticker');
    t.textContent=A.map(a=>a.title).join('  ◆  ');
    t.style.animation='none';t.offsetHeight;t.style.animation='';
    const cards=A.slice(0,12).map((a,i)=>buildCard(a,SIZES[i]||'mc-small')).join('');
    col.innerHTML=`
      <div class="sec-hdr">
        <div class="sec-left"><span class="sec-title">${label}</span><span class="sec-badge">LIVE</span></div>
        <span class="sec-count">${A.length} stories</span>
      </div>
      <div class="mosaic">${cards}</div>`;
  }catch(err){
    col.innerHTML=`<div class="news-err">Failed to load: ${err.message}</div>`;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

const fN=(v,d)=>Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const cls=v=>v>0?'up':v<0?'down':'flat';
const arr=v=>v>0?'▲':v<0?'▼':'—';
const sgn=v=>v>=0?'+':'';
const dec=n=>n.includes('JPY')?2:n.includes('/')?4:2;

function mkRow(name,price,ch,pct,d=2){
  if(price===null)return`<div class="sb-row"><div class="sb-name">${name}</div><div class="sb-val">—</div></div>`;
  return`<div class="sb-row"><div class="sb-name">${name}</div><div class="sb-val">${fN(price,d)}</div><div class="sb-chg ${cls(ch)}">${arr(ch)} ${sgn(ch)}${fN(pct,2)}%</div></div>`;
}

async function loadMarkets(){
  const sb=document.getElementById('sidebar');
  try{
    const r=await fetch('/api/markets');
    const d=await r.json();
    if(!d.ok)throw new Error();
    const now=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    sb.innerHTML=`<div class="sb-widget">
      <div class="sb-head">Markets <button class="sb-refresh" onclick="loadMarkets()">↻</button></div>
      <div class="sb-lbl-sec">Indices</div>${d.indices.map(x=>mkRow(x.name,x.price,x.change,x.pct,2)).join('')}
      <div class="sb-lbl-sec">FX</div>${d.fx.map(x=>mkRow(x.name,x.price,x.change,x.pct,dec(x.name))).join('')}
      <div class="sb-lbl-sec">Commodities</div>${d.commodities.map(x=>mkRow(x.name,x.price,x.change,x.pct,2)).join('')}
      <div class="sb-foot">Yahoo Finance · ${now} ET</div>
    </div>`;
  }catch{
    sb.innerHTML=`<div class="sb-widget"><div class="sb-head">Markets</div><div class="sb-loading">Unavailable</div></div>`;
  }
}

loadNews('national',document.querySelector('.nav-btn'));
loadMarkets();
setInterval(loadMarkets,120000);
</script>
</body>
</html>
